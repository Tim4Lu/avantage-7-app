name: Daily Cashback Update

on:
  schedule:
    # Запуск щодня о 03:00 (UTC)
    - cron: '0 3 * * *'
  # Дозволяє запустити вручну через вкладку Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync script
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: python sync_cashback.py